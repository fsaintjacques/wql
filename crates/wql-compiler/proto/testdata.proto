syntax = "proto3";

package testdata;

message Person {
  string name    = 1;
  int64  age     = 2;
  Address address = 3;
  Status status  = 4;
  bytes  avatar  = 5;
  repeated string tags = 6;
}

message Address {
  string city    = 1;
  string country = 2;
  int32  zip     = 3;
  GeoPoint location = 4;
}

message GeoPoint {
  sint64 lat = 1;
  sint64 lon = 2;
}

enum Status {
  UNKNOWN  = 0;
  ACTIVE   = 1;
  INACTIVE = 2;
}

message Order {
  int64      id         = 1;
  string     customer   = 2;
  repeated LineItem items = 3;
  int64      total_cents = 4;
  bool       shipped    = 5;
}

message LineItem {
  string sku      = 1;
  int32  quantity  = 2;
  int64  price     = 3;
}
