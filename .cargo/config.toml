# Rebuilds the WASM template embedded in wqlc.
# Run this after changing wql-runtime or wql-ir, then copy the output:
#   cargo wasm-template
#   cp target/wasm32-unknown-unknown/release-wasm/wql_wasm.wasm crates/wqlc/data/template.wasm
[alias]
wasm-template = "build -p wql-wasm --target wasm32-unknown-unknown --profile release-wasm"
